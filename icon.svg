<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b81"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- ダンベル -->
  <g transform="translate(256,256)">
    <!-- バー -->
    <rect x="-120" y="-12" width="240" height="24" rx="12" fill="url(#accent)"/>
    <!-- 左プレート外 -->
    <rect x="-160" y="-50" width="30" height="100" rx="8" fill="url(#accent)" opacity="0.8"/>
    <!-- 左プレート内 -->
    <rect x="-135" y="-38" width="20" height="76" rx="6" fill="url(#accent)"/>
    <!-- 右プレート内 -->
    <rect x="115" y="-38" width="20" height="76" rx="6" fill="url(#accent)"/>
    <!-- 右プレート外 -->
    <rect x="130" y="-50" width="30" height="100" rx="8" fill="url(#accent)" opacity="0.8"/>
  </g>
</svg>
